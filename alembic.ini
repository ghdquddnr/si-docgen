# Alembic config. The DB URL is NOT set here; env.py reads it from app.config
# (single source of truth for settings such as DB URL and model name).
[alembic]
script_location = backend/app/db/migrations
# add backend to sys.path so `import app` works when running alembic from repo root
prepend_sys_path = backend
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
